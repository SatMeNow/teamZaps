services:
  teamzaps:
    # Build locally if needed, otherwise pull from registry
    build: .
    # Use 'latest' by default, or override with DOCKER_TAG in .env
    image: ghcr.io/satmenow/teamzaps:${DOCKER_TAG:-latest}
    container_name: teamzaps
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true
    environment:
      - DOTNET_ENVIRONMENT=${DOTNET_ENVIRONMENT:-Production}
      
      # Bot Behavior
      - BotBehavior__MaxBudget=${MAX_BUDGET}
      - BotBehavior__MaxParallelSessions=${MAX_PARALLEL_SESSIONS}
      - BotBehavior__CurrentLocale=${BOT_LOCALE:-en-US}
      
      # Telegram Settings
      - Telegram__BotToken=${TELEGRAM_BOT_TOKEN}
      - Telegram__RootUsers__0=${TELEGRAM_ROOT_USER_ID_1}
      - Telegram__RootUsers__1=${TELEGRAM_ROOT_USER_ID_2}
      - Telegram__RootUsers__2=${TELEGRAM_ROOT_USER_ID_3}
      
      # Backend: ElectrumX (Blockchain Data)
      # Note: SSL is automatically used for port 50002, TCP for 50001
      # - Backends__ElectrumX__Host=${ELECTRUMX_HOST}
      # - Backends__ElectrumX__Port=${ELECTRUMX_PORT}
      # - Backends__ElectrumX__ValidateSslCertificate=${ELECTRUMX_VALIDATE_CERT}
      # - Backends__ElectrumX__Timeout=${ELECTRUMX_TIMEOUT}
      
      # Backend: AlbyHub (NWC)
      - Backends__AlbyHub__ConnectionString=${ALBYHUB_CONNECTION_STRING}
      
      # Backend: LNBits (Alternative)
      # - Backends__LNBits__LndhubUrl=${LNBITS_URL}
      # - Backends__LNBits__ApiKey=${LNBITS_API_KEY}
      
      # Backend: Yadio (Exchange Rates - Free, no auth required)
      # No configuration needed - enabled by adding empty section in appsettings.json
      
      # Backend: CoinCap (Exchange Rates - Deprecated, requires API key)
      # - Backends__CoinCap__ApiKey=${COINCAP_API_KEY}
      
      # Backend: CoinGecko (Exchange Rates - Deprecated, requires API key)
      # - Backends__CoinGecko__ApiKey=${COINGECKO_API_KEY}
      
    volumes:
      # Mount appsettings.json if you want to configure it from the host
      - ./appsettings.json:/app/appsettings.json
      # Mount data directory if the app writes logs or data
      - ./data:/app/data

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    depends_on:
      - teamzaps
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=1800
